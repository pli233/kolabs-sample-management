# Render Blueprint — free Docker web service.
# Deploy: push to GitHub, then render.com → New → Blueprint → pick this repo.
# Set DB_URL to your Supabase Postgres connection string (the Blueprint prompts
# for it). Parsed data lives in the DB, so no disk is needed and the free plan's
# ephemeral filesystem is fine — feeds persist in Supabase across restarts.
services:
  - type: web
    name: kolabs-sample-management
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_URL
        sync: false  # paste your Supabase connection string in the dashboard
